apiVersion: apps/v1
kind: Deployment
metadata:
  name: tournament-service
  labels:
    app: tournament-service
spec:
  replicas: 2
  selector:
    matchLabels:
      app: tournament-service
  template:
    metadata:
      labels:
        app: tournament-service
    spec:
      containers:
      - name: tournament-service
        image: chess-app-api/tournament-service:latest
        ports:
        - containerPort: 8004
        env:
        - name: DJANGO_SETTINGS_MODULE
          value: "config.settings.production"
        - name: DJANGO_SECRET_KEY
          valueFrom:
            secretKeyRef:
              name: tournament-secrets
              key: django-secret-key
        - name: JWT_ACCESS_SECRET
          valueFrom:
            secretKeyRef:
              name: jwt-secrets
              key: access-secret
        - name: MYSQL_DATABASE
          value: "gameplatform_tournaments"
        - name: MYSQL_USER
          valueFrom:
            secretKeyRef:
              name: mysql-secrets
              key: user
        - name: MYSQL_PASSWORD
          valueFrom:
            secretKeyRef:
              name: mysql-secrets
              key: password
        - name: MYSQL_HOST
          value: "mysql-tournament"
        - name: MYSQL_PORT
          value: "3306"
        - name: REDIS_URL
          value: "redis://redis:6379/5"
        - name: CELERY_BROKER_URL
          value: "redis://redis:6379/5"
        - name: CELERY_RESULT_BACKEND
          value: "redis://redis:6379/5"
        resources:
          requests:
            memory: "256Mi"
            cpu: "250m"
          limits:
            memory: "512Mi"
            cpu: "500m"
        livenessProbe:
          httpGet:
            path: /health/
            port: 8004
          initialDelaySeconds: 30
          periodSeconds: 15
        readinessProbe:
          httpGet:
            path: /health/
            port: 8004
          initialDelaySeconds: 15
          periodSeconds: 10
---
apiVersion: v1
kind: Service
metadata:
  name: tournament-service
spec:
  selector:
    app: tournament-service
  ports:
  - port: 8004
    targetPort: 8004
  type: ClusterIP
---
apiVersion: autoscaling/v2
kind: HorizontalPodAutoscaler
metadata:
  name: tournament-service-hpa
spec:
  scaleTargetRef:
    apiVersion: apps/v1
    kind: Deployment
    name: tournament-service
  minReplicas: 2
  maxReplicas: 6
  metrics:
  - type: Resource
    resource:
      name: cpu
      target:
        type: Utilization
        averageUtilization: 70
